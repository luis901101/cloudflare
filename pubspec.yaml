name: cloudflare
description: This is a dart package for Cloudflare APIs — Images, Stream, Live Inputs, and R2 object storage (S3-compatible).
version: 10.0.0
homepage: https://github.com/luis901101/cloudflare

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  json_annotation: ^4.10.0
  retrofit: ^4.9.2
  http: '>=0.13.4 <2.0.0'
  dio: ^5.9.1
  cross_file: ^0.3.5+2
  path: ^1.9.1
  tusc: ^3.0.0
#    path: ../tusc
  meta: ^1.17.0 # meta is pinned to version 1.17.0 by flutter_test from the flutter SDK.
  copy_with_extension: ^12.1.0
  aws_common: ^0.7.12
  aws_signature_v4: ^0.6.10
  xml: ^6.0.0
  http_parser: ^4.0.0
  crypto: ^3.0.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.30.0
  json_serializable: ^6.13.0
  retrofit_generator: ^10.2.3
  copy_with_extension_gen: ^12.1.0
  build_runner: ^2.12.2 #flutter pub run build_runner build
