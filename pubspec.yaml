name: cloudflare
description: This is a dart package for Cloudflare API to allow easy Image, Stream and Live Input api management.
version: 8.0.0
homepage: https://github.com/luis901101/cloudflare

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  json_annotation: ^4.10.0
  retrofit: ^4.9.2
  http: '>=0.13.4 <2.0.0'
  dio: ^5.9.1
  cross_file: ^0.3.5+2
  path: ^1.9.1
  tusc: ^2.1.0
#    path: ../tusc
  meta: ^1.17.0 # meta is pinned to version 1.17.0 by flutter_test from the flutter SDK.
  copy_with_extension: ^12.0.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.29.0
  json_serializable: ^6.12.0
  retrofit_generator: ^10.2.3
  copy_with_extension_gen: ^12.0.0
  build_runner: ^2.11.1 #flutter pub run build_runner build
